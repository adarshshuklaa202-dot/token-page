<!DOCTYPE html>
<html>
<head>
<title>Get Token</title>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AlzaSyALDsUb14vKOHt-3rA1cqQzqKLJrSTI8mY",
authDomain: "radha-jaap-mala.firebaseapp.com",
databaseURL: "https://radha-jaap-mala-default-rtdb.firebaseio.com",
projectId: "radha-jaap-mala",
storageBucket: "radha-jaap-mala.appspot.com",
messagingSenderId: "582552451696",
appId: "1:582552451696:web:8f83abf48da0622738d2b5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function generateRandomToken(){
return "TKN" + Math.random().toString(36).substring(2,10).toUpperCase();
}

const token = generateRandomToken();

set(ref(db, "tokens/" + token), {
created: Date.now()
});

document.body.innerHTML = `
<h2>Your Token</h2>
<h1>${token}</h1>
<button onclick="navigator.clipboard.writeText('${token}')">Copy</button>
`;

</script>
</head>

</html>
