<!DOCTYPE html>
<html>
<head>
<title>Your Access Token</title>
</head>
<body style="background:black;color:white;text-align:center;padding-top:100px;font-family:sans-serif;">

<h2>🔐 Your Access Token</h2>

<h1 id="token" style="color:lime;"></h1>

<p>Copy this code and paste in app</p>

<script>
function generateToken() {
    const now = new Date();
    const days = Math.floor(now.getTime() / (1000 * 60 * 60 * 24));
    const period = Math.floor(days / 3);
    const base = "STUDYPRO";
    let token = "";
    for(let i = 0; i < base.length; i++){
        token += String.fromCharCode(base.charCodeAt(i) + (period % 5));
    }
    return token;
}
document.getElementById("token").innerText = generateToken();
</script>

</body>
</html>
